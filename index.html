<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#060607" />
    <meta name="color-scheme" content="dark" />

    <title>Alexander Fedchin — Photographer &amp; Videographer</title>
    <meta
      name="description"
      content="Cinematic photography and videography by Alexander Fedchin, based in Tampere, Finland. Portraits, landscapes, short films and music videos."
    />

    <!-- Open Graph / social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Alexander Fedchin — Photographer & Videographer" />
    <meta property="og:description" content="Cinematic photography and videography based in Tampere, Finland." />
    <meta property="og:image" content="/favicon.svg" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Fonts: Inter Tight (bold display) + Inter (UI/text) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://i.ytimg.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Paint the rich-black canvas before CSS loads to avoid a white flash. -->
    <style>
      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
        background-color: #060607;
        color: #ececec;
      }
      #root { isolation: isolate; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
